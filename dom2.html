<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Calculator</title>
  </head>
  <body>
    <p>Amazon Shipping Calculator</p>
    <input
      onkeydown="costKeyDown(event)"
      class="cost"
      type="text"
      placeholder="Cost of order"
    />
    <button onclick="calculate()">Calculator</button>
    <p class="js-total-cost"></p>
  </body>
  <script>
    console.log(window);
    function costKeyDown(event) {
      if (event.key === "Enter") calculate();
    }
    function calculate() {
      const input = document.querySelector(".cost");
      let price = Number(input.value);
      if (price < 40 || price < 10) {
        price = price + 10;
      }
      let valuee = (document.querySelector(".js-total-cost").innerHTML =
        ` $${price}`);
    }
  </script>
</html>
